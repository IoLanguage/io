  <script type="application/json" id="colvmn-prefetch">{"./_index.json":{"ok":true,"status":200,"content":"{\n  \"title\": \"Future Work\",\n  \"subtitle\": \"Design notes and proposals for upcoming changes.\",\n  \"content\": [\n    {\n      \"type\": \"ContentCards\",\n      \"columns\": 2,\n      \"items\": [\"Exceptions\"]\n    }\n  ]\n}\n"},"../_index.json":{"ok":true,"status":200,"content":"{\n  \"title\": \"Technical Notes\",\n  \"subtitle\": \"Design docs on WASM targeting, stackless evaluation, and future work.\",\n  \"content\": [\n    {\n      \"type\": \"ContentCards\",\n      \"columns\": 2,\n      \"items\": [\n        \"WASM\",\n        \"Stackless\",\n        \"Future Work\"\n      ]\n    }\n  ]\n}\n"},"../../_index.json":{"ok":true,"status":200,"content":"{\n  \"title\": \"Documentation\",\n  \"subtitle\": \"Guides, tutorial, language reference, and design notes.\",\n  \"content\": [\n    {\n      \"type\": \"ContentCards\",\n      \"columns\": 2,\n      \"items\": [\n        \"Guide\",\n        \"Tutorial\",\n        \"Book\",\n        \"Reference\",\n        \"Style Guide\",\n        \"Implementation\",\n        \"Technical Notes\",\n        \"Paper\"\n      ]\n    }\n  ]\n}\n"},"../../../_index.json":{"ok":true,"status":200,"content":"{\n  \"title\": \"\",\n  \"subtitle\": \"A small, prototype-based programming language — now targeting WASM/WASI.\",\n  \"topTitle\": \"Io\",\n  \"content\": [\n    {\n      \"type\": \"ContentText\",\n      \"title\": \"About\",\n      \"body\": \"\u003cp>Io is a dynamic, prototype-based language built on a few simple ideas taken from Smalltalk (all values are objects), Self (prototypes, not classes), NewtonScript (differential inheritance), Act1 (actors and futures for concurrency), Lisp (code is a runtime-inspectable message tree), and Lua (small and embeddable).\u003c/p>\u003cp>Its guiding design principle is simplicity and power through conceptual unification &mdash; a handful of primitives stand in for features most languages keep separate:\u003c/p>\u003ctable>\u003cthead>\u003ctr>\u003cth>concept\u003c/th>\u003cth>unifies\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>scopable blocks\u003c/td>\u003ctd>functions, methods, closures\u003c/td>\u003c/tr>\u003ctr>\u003ctd>prototypes\u003c/td>\u003ctd>objects, classes, namespaces, locals\u003c/td>\u003c/tr>\u003ctr>\u003ctd>messages\u003c/td>\u003ctd>operators, calls, assigns, var access\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003cp>The VM is written in portable C and now targets WebAssembly (WASI) by default. The same binary runs under wasmtime, Node.js, or directly in the browser via a bidirectional Io↔JavaScript bridge.\u003c/p>\"\n    },\n    {\n      \"type\": \"ContentText\",\n      \"title\": \"Key Features\",\n      \"body\": \"\u003cul>\u003cli>\u003cstrong>Minimal Syntax\u003c/strong> — Expressions only. No keywords, no statements, no special forms. Every expression is a message send, including assignment, operators, and control flow.\u003c/li>\u003cli>\u003cstrong>Prototype-Based Objects\u003c/strong> — No classes. New objects are clones of existing ones, slots are created on write, and any object can be used as a prototype for any other.\u003c/li>\u003cli>\u003cstrong>Differential Inheritance\u003c/strong> — Clones inherit by reference until a slot is assigned, so most objects carry only the deltas that distinguish them from their parents.\u003c/li>\u003cli>\u003cstrong>Multiple Inheritance\u003c/strong> — Every object has a list of protos; lookup is depth-first with runtime loop detection.\u003c/li>\u003cli>\u003cstrong>Messages as Code\u003c/strong> — Messages form trees that can be inspected and rewritten at runtime. Argument evaluation can be deferred, so \u003ccode>if\u003c/code>, \u003ccode>while\u003c/code>, and \u003ccode>for\u003c/code> are implementable in Io itself.\u003c/li>\u003cli>\u003cstrong>Runtime Introspection\u003c/strong> — Slots, protos, message trees, and block source code are all inspectable and modifiable at runtime.\u003c/li>\u003cli>\u003cstrong>Actors and Futures\u003c/strong> — Any object can receive \u003ccode>asyncSend\u003c/code> or \u003ccode>futureSend\u003c/code> messages and run its own coroutine. Futures are transparent (they become their result) and detect deadlocks automatically.\u003c/li>\u003cli>\u003cstrong>Coroutines Everywhere\u003c/strong> — Concurrency uses cooperative user-level coroutines rather than OS threads, scaling to thousands of active tasks without thread-level overhead.\u003c/li>\u003cli>\u003cstrong>First-Class Continuations\u003c/strong> — the VM is callcc-capable: the current computation can be captured as a first-class value and later resumed, stored, or serialized.\u003c/li>\u003cli>\u003cstrong>Unified Sequences\u003c/strong> — Strings, buffers, and numeric vectors share one \u003ccode>Sequence\u003c/code> primitive, with multiple item types, text encodings, and SIMD acceleration on float vectors.\u003c/li>\u003cli>\u003cstrong>WASM/WASI Target\u003c/strong> — The default build produces a single WebAssembly module that runs under wasmtime, Node.js, or in browsers, with full access to the DOM when hosted in a page.\u003c/li>\u003cli>\u003cstrong>Io↔JS Bridge\u003c/strong> — Host integration on the browser target is bidirectional: Io can call JavaScript functions and JavaScript can call Io methods, replacing the native-addon model of earlier Io releases.\u003c/li>\u003cli>\u003cstrong>Embeddable Core\u003c/strong> — The VM ships as a single WebAssembly module under a BSD license, embeddable in any WASM host — browsers, Node.js, or native apps via wasmtime or wasmer.\u003c/li>\u003c/ul>\"\n    },\n    {\n      \"type\": \"ContentCards\",\n      \"columns\": 2,\n      \"items\": [\n        {\n          \"title\": \"Live Interpreter\",\n          \"href\": \"repl/index.html\",\n          \"subtitle\": \"Try Io right now — the full VM compiled to WebAssembly, running in your browser.\"\n        },\n        {\n          \"title\": \"Documentation\",\n          \"href\": \"docs/index.html\",\n          \"subtitle\": \"Guides, tutorial, language reference, and design notes.\"\n        },\n        \"FAQ\",\n        {\n          \"title\": \"Links\",\n          \"href\": \"Links/index.html\",\n          \"subtitle\": \"Books, tutorials, articles, papers, tools, and community resources.\"\n        },\n        \"Timeline\",\n        {\n          \"title\": \"Performance\",\n          \"href\": \"bench/index.html\",\n          \"subtitle\": \"Benchmark results tracked over time — interpreter ops, shootout programs, and SIMD throughput.\"\n        },\n        {\n          \"title\": \"GitHub Repository\",\n          \"href\": \"https://github.com/IoLanguage/io\",\n          \"subtitle\": \"Source code, issues, and contributions.\"\n        }\n      ]\n    },\n    {\n      \"type\": \"ContentText\",\n      \"body\": \"\u003cp>For AI agents: \u003ca href=\\\"llms.txt\\\">llms.txt\u003c/a> (curated index) and \u003ca href=\\\"llms-full.txt\\\">llms-full.txt\u003c/a> (full content).\u003c/p>\"\n    }\n  ]\n}\n"},"Exceptions/_index.json":{"ok":false,"status":404},"Exceptions/_index.md":{"ok":true,"status":200,"content":"# Exceptions\n\nDesign notes on the current exception system and proposed improvements.\n\n## Current Implementation\n\n### try/catch (non-resumable)\n\nStandard exception handling. `try(code)` runs code in a child coroutine. If an exception is raised, it's captured on the coroutine and returned. `catch` filters by exception type. `pass` re-raises.\n\n```io\ne := try(Exception raise(\"boom\"))\ne catch(Exception, writeln(e error))\n```\n\n### signal/withHandler (resumable)\n\nAdded in the `stackless` branch. `withHandler` installs a handler on the coroutine's handler stack, evaluates the body, then removes the handler. `signal` walks the handler stack to find a matching handler and calls it as a subroutine — the signaler's frames remain on the stack.\n\n```io\nresult := withHandler(Exception, block(exc, resume,\n    \"default value\"\n),\n    Exception signal(\"something went wrong\")\n)\n// result is \"default value\"\n```\n\nThe handler runs as a normal block activation with its own frame. Whatever the handler returns becomes the return value of `signal()` at the call site. No coroutine switch, no frame manipulation, no `callcc`.\n\n`_Resumption` is a placeholder object whose `invoke(v)` returns `v`. It exists for API consistency but is functionally the identity.\n\n## Comparison with Other Languages\n\n### Common Lisp Condition System\n\nCL separates three concerns:\n\n1. **Signaling** — low-level code detects a problem and signals a condition\n2. **Handling** — high-level code decides on a recovery policy\n3. **Restarting** — low-level code offers named recovery strategies\n\n```lisp\n;; Low-level: offers restarts, doesn't choose\n(defun parse-entry (line)\n  (restart-case (actually-parse line)\n    (skip-entry () nil)\n    (use-value (v) v)))\n\n;; High-level: chooses policy, doesn't know recovery details\n(handler-bind ((malformed-entry\n                (lambda (c) (invoke-restart 'skip-entry))))\n  (parse-log-file stream))\n```\n\nKey features Io lacks:\n- **Restarts**: named recovery points established by the signaler. The handler picks one without knowing recovery details. This decouples policy from mechanism.\n- **Decline**: a `handler-bind` handler can return normally without invoking a restart, and the search continues to the next handler. In Io, the handler's return value is always used.\n- **Interactive debugging**: unhandled conditions present available restarts to the developer in the debugger. SLIME's debugger lets you inspect the live stack, fix data, and resume — the program continues as if the error never happened.\n\n### Smalltalk (on:do:)\n\nHandler receives the exception object with a rich protocol:\n- `ex resume: value` — resume at signal site with value (non-local return from handler)\n- `ex return: value` — return from the protected block\n- `ex retry` — re-run the protected block\n- `ex pass` — delegate to outer handler\n- `ex outer` — invoke outer handler, then resume\n\nMore expressive than Io's current system but lacks CL's restart separation.\n\n## Possible Directions\n\n### 1. Add Restarts (CL-style)\n\nThe most impactful addition. Restarts let the signaler offer recovery strategies without choosing one, and the handler choose a strategy without knowing recovery details.\n\nPossible Io API:\n\n```io\n// Low-level code establishes restarts\nparseEntry := method(line,\n    withRestarts(\n        list(\n            Restart clone setName(\"skipEntry\") setAction(block(nil)),\n            Restart clone setName(\"useValue\") setAction(block(v, v))\n        ),\n        actuallyParse(line)\n    )\n)\n\n// High-level code picks a policy\nwithHandler(MalformedEntry, block(exc, resume,\n    invokeRestart(\"skipEntry\")\n),\n    parseLogFile(stream)\n)\n```\n\nImplementation: a restart registry (List) on the Coroutine, similar to `handlerStack`. `withRestarts` pushes entries, `invokeRestart` walks the registry. Pure Io-level code, no VM changes needed.\n\n### 2. Handler Decline\n\nAllow a handler to decline (pass to next handler) instead of always producing a value. Could use a sentinel:\n\n```io\nwithHandler(Exception, block(exc, resume,\n    if(exc error containsSeq(\"fatal\"),\n        decline  // search continues to next handler\n    ,\n        \"recovered\"\n    )\n),\n    body\n)\n```\n\n### 3. Richer Exception Protocol (Smalltalk-style)\n\nAdd methods to the exception object for `retry`, `return(value)`, `outer`. These would use the eval loop's existing stop-status mechanism or handler stack walking.\n\n### 4. Interactive Restart Selection in REPL\n\nWhen an unhandled signal reaches the top level with available restarts, present them to the user:\n\n```\nError: Malformed entry at line 42\nAvailable restarts:\n  0: [skipEntry] Skip this entry\n  1: [useValue]  Supply a replacement value\n  2: [abort]     Abort\nPick a restart:\n```\n\nThis requires restarts (direction 1) and REPL integration.\n\n### Recommendation\n\nStart with **restarts** (direction 1). They provide the biggest leverage — decoupling error policy from recovery mechanism — and map naturally to Io's prototype model. A Restart is just an Object with `name` and `action` slots. The handler/restart registries are Lists on the Coroutine. No VM changes, no new primitives, just Io-level code building on `withHandler`.\n\nDecline (direction 2) is a small addition on top. Interactive selection (direction 4) is the long-term payoff but requires restarts first.\n"}}</script>
