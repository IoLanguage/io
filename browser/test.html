<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Io Language — Tests</title>
<style>
	* { box-sizing: border-box; margin: 0; padding: 0; }
	html, body { height: 100%; }

	body {
		font-family: helvetica, sans;
		font-size: 13px;
		background-color: #191919;
		color: #999;
		padding: 100px 0 40px 12%;
	}

	h1 {
		font-family: "Helvetica Neue Bold", sans-serif;
		font-size: 5em;
		font-weight: 600;
		color: #fff;
		line-height: 1;
	}
	.sub {
		font-family: "Helvetica Neue Bold", sans-serif;
		font-weight: 600;
		font-size: 1em;
		color: #fff;
	}

	#status {
		font-weight: bold;
		color: #fff;
		font-size: 14px;
		padding: 15px 0;
	}

	#results {
		border-left: 1px solid #666;
		padding-left: 2em;
		margin-top: 20px;
	}

	.test {
		margin-bottom: 0.6em;
		font-weight: bold;
		font-size: 1em;
		line-height: 1.4em;
	}

	.test .label { color: #fff; }
	.test .pass { color: #6c6; }
	.test .fail { color: #c66; }

	.test .detail {
		font-weight: normal;
		color: #666;
		white-space: pre-wrap;
		margin-left: 1em;
	}

	#summary {
		margin-top: 1em;
		font-weight: bold;
		font-size: 14px;
	}
	#summary.all-pass { color: #6c6; }
	#summary.has-fail { color: #c66; }

	.button {
		font-family: helvetica, sans;
		font-size: 1em;
		border: #444 1px solid;
		background-color: transparent;
		color: #666;
		padding: 0.1em 0.5em;
		cursor: pointer;
		margin-top: 15px;
		display: inline-block;
	}
	.button:hover {
		border-color: #888;
		color: #aaa;
	}
</style>
</head>
<body>
	<h1>io</h1>
	<div class="sub">/ tests</div>

	<div id="status">Loading Io VM...</div>
	<div id="sandbox" style="display:none"></div>
	<div id="results"></div>
	<div id="summary"></div>
	<span class="button" onclick="location.reload()">RE-RUN</span>

	<script src="io.js"></script>
	<script>
const tests = [
	{ name: "println", code: '"hello" println', expect: "hello\n" },
	{ name: "arithmetic", code: "1 + 2", expect: "==> 3\n" },
	{ name: "persistent state", code: ["x := 42", "x * 2"], expect: "==> 84\n" },
	{ name: "list ops", code: "list(1,2,3) size", expect: "==> 3\n" },
	{ name: "string methods", code: '"hello" asMutable uppercase', expect: "==> HELLO\n" },
	{ name: "block/method", code: "method(x, x * x) call(7)", expect: "==> 49\n" },
	{ name: "error handling", code: "try(nil foo) type", expect: "==> Exception\n" },

	// DOM via JS bridge
	{ name: "document body", code: "JS document body tagName", expect: "==> BODY\n" },
	{ name: "createElement", code: 'JS document createElement("div") tagName', expect: "==> DIV\n" },
	{ name: "set/get textContent", code: [
		'el := JS document createElement("span")',
		'el set("textContent", "hello dom")',
		'el textContent',
	], expect: "==> hello dom\n" },
	{ name: "setAttribute / getAttribute", code: [
		'el := JS document createElement("div")',
		'el setAttribute("data-x", "42")',
		'el getAttribute("data-x")',
	], expect: "==> 42\n" },
	{ name: "querySelector body", code: 'JS document querySelector("body") tagName', expect: "==> BODY\n" },
	{ name: "appendChild + children", code: [
		'parent := JS document createElement("div")',
		'parent appendChild(JS document createElement("span"))',
		'parent appendChild(JS document createElement("span"))',
		'parent get("children") length',
	], expect: "==> 2\n" },
	{ name: "set/get innerHTML", code: [
		'el := JS document createElement("div")',
		'el set("innerHTML", "<b>bold</b>")',
		'el innerHTML',
	], expect: "==> <b>bold</b>\n" },
	{ name: "style setProperty / getPropertyValue", code: [
		'el := JS document createElement("div")',
		'el style setProperty("color", "red")',
		'el style getPropertyValue("color")',
	], expect: "==> red\n" },
	{ name: "classList add / contains", code: [
		'el := JS document createElement("div")',
		'el classList add("foo")',
		'el classList contains("foo")',
	], expect: "==> true\n" },
	{ name: "getElementById", code: 'JS document getElementById("sandbox") tagName', expect: "==> DIV\n" },
	{ name: "querySelectorAll", code: 'JS document querySelectorAll("meta") length > 0', expect: "==> true\n" },

	// JS bridge: property access
	{ name: "JS Math sqrt", code: "JS Math sqrt(144)", expect: "==> 12\n" },
	{ name: "JS Math PI", code: "JS Math PI > 3", expect: "==> true\n" },
	{ name: "JS typeof", code: "JS Math typeof", expect: "==> object\n" },

	// JS bridge: method call
	{ name: "JS parseInt", code: 'JS parseInt("42")', expect: "==> 42\n" },
	{ name: "JS isNaN", code: "JS isNaN(0/0)", expect: "==> true\n" },

	// JS bridge: value marshaling
	{ name: "JS Array round-trip", code: 'JS JSON parse("[1,2,3]") size', expect: "==> 3\n" },
	{ name: "JS List to Array", code: 'JS JSON stringify(list(1,2,3))', expect: '==> [1,2,3]\n' },
	{ name: "JS Map to Object", code: [
		'm := Map clone atPut("a", 1)',
		'JS JSON stringify(m)',
	], expect: '==> {"a":1}\n' },

	// JS bridge: JSObject get/set
	{ name: "JSObject set/get", code: [
		'obj := JS JSON parse("{}")',
		'obj set("x", 42)',
		'obj get("x")',
	], expect: "==> 42\n" },

	// JS bridge: JSObject at (array index)
	{ name: "JSObject at", code: [
		'arr := JS JSON parse("[10,20,30]")',
		'arr at(1)',
	], expect: "==> 20\n" },

	// JS bridge: chained property access
	{ name: "JS chained access", code: 'JS JSON stringify(JS JSON parse("[4,5]"))', expect: "==> [4,5]\n" },

	// JS bridge: boolean/nil marshaling
	{ name: "JS true/false", code: 'JS isNaN(42)', expect: "==> false\n" },
	{ name: "JS nil result", code: 'JS console log("test") == nil', expect: "==> true\n" },
];

function escapeText(s) {
	return JSON.stringify(s);
}

async function runTests() {
	const statusEl = document.getElementById("status");
	const resultsEl = document.getElementById("results");
	const summaryEl = document.getElementById("summary");

	try {
		await loadIo();
	} catch (e) {
		statusEl.textContent = "Failed to load: " + e.message;
		statusEl.style.color = "#c66";
		return;
	}

	statusEl.textContent = "Running tests...";

	let passed = 0;
	let total = tests.length;

	for (const t of tests) {
		const div = document.createElement("div");
		div.className = "test";

		let result;
		const codes = Array.isArray(t.code) ? t.code : [t.code];
		for (const c of codes) {
			result = ioEval(c);
		}

		let ok = false;
		if (t.expectError) {
			ok = result.status !== 0 || result.output.toLowerCase().includes("exception");
		} else {
			ok = result.output === t.expect;
		}

		if (ok) {
			passed++;
			div.innerHTML = '<span class="pass">PASS</span> <span class="label">' +
				t.name + '</span>';
		} else {
			let detail = "";
			if (t.expectError) {
				detail = "expected error, got status=" + result.status +
					" output=" + escapeText(result.output);
			} else {
				detail = "expected " + escapeText(t.expect) +
					"\n     got " + escapeText(result.output);
			}
			div.innerHTML = '<span class="fail">FAIL</span> <span class="label">' +
				t.name + '</span>' +
				'<div class="detail">' + detail + '</div>';
		}

		resultsEl.appendChild(div);
	}

	statusEl.style.display = "none";
	summaryEl.textContent = passed + " / " + total + " passed";
	summaryEl.className = passed === total ? "all-pass" : "has-fail";
}

runTests();
	</script>
</body>
</html>
